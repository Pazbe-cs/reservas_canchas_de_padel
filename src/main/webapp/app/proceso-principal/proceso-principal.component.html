<div class="container-fluid mt-3 proceso-principal">
  <h2 class="mb-4">Panel de Reservas - Proceso Principal</h2>

  <!-- Tarjetas superiores -->
  <div class="row mb-4">
    <div class="col-md-4" *ngFor="let tarjeta of tarjetas">
      <div class="card tarjeta-resumen" [ngClass]="'tarjeta-' + tarjeta.color">
        <div class="card-body">
          <h5 class="card-title">{{ tarjeta.titulo }}</h5>
          <h3 class="card-value">{{ tarjeta.valor }}</h3>
          <p class="card-text">{{ tarjeta.descripcion }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenido principal: formulario + tabla -->
  <div class="row">
    <!-- Columna izquierda: Formulario -->
    <div class="col-md-5">
      <div class="card">
        <div class="card-header bg-info text-white">
          Registro Rápido de Reserva
        </div>
        <div class="card-body">
          <form (ngSubmit)="registrarReserva()">
            <div class="mb-3">
              <label class="form-label">Tipo de Reserva</label>
              <select class="form-select" [(ngModel)]="tipoReserva" name="tipoReserva">
                <option>Amistoso</option>
                <option>Torneo</option>
                <option>Entrenamiento</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Cancha</label>
              <select class="form-select" [(ngModel)]="canchaSeleccionada" name="cancha">
                <option>Cancha 1</option>
                <option>Cancha 2</option>
                <option>Cancha 3</option>
                <option>Cancha 4</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Horario</label>
              <select class="form-select" [(ngModel)]="horarioSeleccionado" name="horario">
                <option>17:00 - 18:00</option>
                <option>18:00 - 19:00</option>
                <option>19:00 - 20:00</option>
                <option>20:00 - 21:00</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Nombre del Cliente</label>
              <input class="form-control" [(ngModel)]="nombreCliente" name="nombreCliente" />
            </div>

            <div class="mb-3">
              <label class="form-label">Teléfono</label>
              <input class="form-control" [(ngModel)]="telefonoCliente" name="telefonoCliente" />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Registrar Reserva
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Columna derecha: Tabla -->
    <div class="col-md-7">
      <div class="card">
        <div class="card-header bg-secondary text-white">
          Últimas Reservas
        </div>
        <div class="card-body p-0">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Cancha</th>
                <th>Horario</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let r of ultimasReservas">
                <td>{{ r.fecha }}</td>
                <td>{{ r.cancha }}</td>
                <td>{{ r.horario }}</td>
                <td>
                  <span
                    class="badge"
                    [ngClass]="{
                      'bg-success': r.estado === 'Confirmada',
                      'bg-warning text-dark': r.estado === 'Pendiente',
                      'bg-danger': r.estado === 'Cancelada'
                    }"
                  >
                    {{ r.estado }}
                  </span>
                </td>
              </tr>
              <tr *ngIf="ultimasReservas.length === 0">
                <td colspan="4" class="text-center py-3">No hay reservas registradas aún.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
